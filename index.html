<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Signout Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --text: #eee;
  --text-muted: #999;
  --success: #2ecc71;
  --border: #2a2a4a;
  --input-bg: #0d1b2a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 140px;
  -webkit-text-size-adjust: 100%;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .subtitle { font-size: 12px; color: var(--text-muted); }
.btn-clear {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}

/* Patient List */
.patient-list { padding: 12px; }
.patient-list:empty::after {
  content: 'No patients yet. Tap "+ Add Patient" to start.';
  display: block;
  text-align: center;
  color: var(--text-muted);
  padding: 60px 20px;
  font-size: 16px;
}

.patient-card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid var(--accent);
}
.patient-card .pt-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.patient-card .pt-dob {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.patient-card .pt-field-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-top: 8px;
}
.patient-card .pt-field-value {
  font-size: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
  word-break: break-word;
}
.card-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.card-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}
.btn-edit { background: var(--surface); color: var(--text); }
.btn-delete { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

/* Bottom Actions */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  z-index: 10;
}
.btn-add {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
  margin-bottom: 8px;
}
.btn-copy {
  width: 100%;
  padding: 14px;
  background: var(--success);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
}
.btn-copy:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.last-saved {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Modal Overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: flex-start;
  overflow-y: auto;
  padding: 20px 12px;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 100%;
  max-width: 500px;
  padding: 20px;
  margin-top: 10px;
}
.modal h2 {
  font-size: 20px;
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  margin-top: 14px;
}
.modal label:first-of-type { margin-top: 0; }
.modal textarea,
.modal input[type="text"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  padding: 12px;
  font-family: inherit;
  resize: vertical;
}
.modal textarea:focus,
.modal input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}
.paste-area { min-height: 120px; }
.assessment-area { min-height: 100px; }
.separator {
  border: none;
  border-top: 1px solid var(--border);
  margin: 18px 0 4px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.modal-actions button {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
}
.btn-save { background: var(--success); color: white; }
.btn-cancel { background: var(--card); color: var(--text); }

/* Confirm Modal */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.confirm-overlay.active { display: flex; }
.confirm-box {
  background: var(--surface);
  border-radius: 16px;
  padding: 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
}
.confirm-box p {
  font-size: 16px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.confirm-box .confirm-actions {
  display: flex;
  gap: 10px;
}
.confirm-box .confirm-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  min-height: 44px;
}
.btn-confirm-yes { background: var(--accent); color: white; }
.btn-confirm-no { background: var(--card); color: var(--text); }

/* Toast */
.toast {
  position: fixed;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>SIGNOUT TOOL</h1>
    <div class="subtitle" id="dateDisplay"></div>
  </div>
  <button class="btn-clear" id="btnClearAll">Clear All</button>
</div>

<!-- Patient List -->
<div class="patient-list" id="patientList"></div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <button class="btn-add" id="btnAddPatient">+ Add Patient</button>
  <button class="btn-copy" id="btnCopySignout" disabled>Copy Signout</button>
  <div class="last-saved" id="lastSaved"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">NEW PATIENT</h2>

    <label for="pasteArea">Paste PerfectServe Text</label>
    <textarea id="pasteArea" class="paste-area" placeholder="Long-press in Photos → Select All → Copy → Paste here"></textarea>

    <hr class="separator">

    <label for="fieldName">Patient Name</label>
    <input type="text" id="fieldName" placeholder="Last, First">

    <label for="fieldDob">Date of Birth</label>
    <input type="text" id="fieldDob" placeholder="MM/DD/YYYY">

    <label for="fieldMessage">Message</label>
    <textarea id="fieldMessage" rows="3" placeholder="Reason for call / nurse message"></textarea>

    <label for="fieldAssessment">Your Assessment / Plan</label>
    <textarea id="fieldAssessment" class="assessment-area" placeholder="What you did, orders given, plan..."></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save" id="btnSave">Save Patient</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMessage">Are you sure?</p>
    <div class="confirm-actions">
      <button class="btn-confirm-no" id="confirmNo">Cancel</button>
      <button class="btn-confirm-yes" id="confirmYes">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'signout_patients';
const STORAGE_SAVED_KEY = 'signout_last_saved';

// ── State ──
let patients = [];
let editingIndex = null;

// ── DOM refs ──
const patientListEl = document.getElementById('patientList');
const btnAddPatient = document.getElementById('btnAddPatient');
const btnCopySignout = document.getElementById('btnCopySignout');
const btnClearAll = document.getElementById('btnClearAll');
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const pasteArea = document.getElementById('pasteArea');
const fieldName = document.getElementById('fieldName');
const fieldDob = document.getElementById('fieldDob');
const fieldMessage = document.getElementById('fieldMessage');
const fieldAssessment = document.getElementById('fieldAssessment');
const btnSave = document.getElementById('btnSave');
const btnCancel = document.getElementById('btnCancel');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmMessage = document.getElementById('confirmMessage');
const confirmYes = document.getElementById('confirmYes');
const confirmNo = document.getElementById('confirmNo');
const lastSavedEl = document.getElementById('lastSaved');
const dateDisplay = document.getElementById('dateDisplay');
const toastEl = document.getElementById('toast');

// ── Init ──
function init() {
  loadPatients();
  renderList();
  updateDateDisplay();
  updateLastSaved();

  btnAddPatient.addEventListener('click', openAddModal);
  btnCopySignout.addEventListener('click', copySignout);
  btnClearAll.addEventListener('click', clearAll);
  btnSave.addEventListener('click', savePatient);
  btnCancel.addEventListener('click', closeModal);
  pasteArea.addEventListener('input', onPasteInput);

  window.addEventListener('beforeunload', (e) => {
    if (patients.length > 0) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

// ── Date ──
function updateDateDisplay() {
  const now = new Date();
  dateDisplay.textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', {
    month: '2-digit', day: '2-digit', year: 'numeric'
  });
}

// ── Storage ──
function loadPatients() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    patients = data ? JSON.parse(data) : [];
  } catch {
    patients = [];
  }
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(patients));
  const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  localStorage.setItem(STORAGE_SAVED_KEY, now);
  updateLastSaved();
}

function updateLastSaved() {
  const saved = localStorage.getItem(STORAGE_SAVED_KEY);
  lastSavedEl.textContent = saved ? `Last saved: ${saved}` : '';
}

// ── Parser ──
function extractFromPaste(text) {
  const result = { name: '', dob: '', message: '' };
  if (!text.trim()) return result;

  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);

  // Extract DOB — look for date patterns
  const dobRegex = /\b(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/;
  let dobLineIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const match = lines[i].match(dobRegex);
    if (match) {
      // Check if this line looks like a DOB line (contains DOB/dob/birth or is a standalone date)
      const line = lines[i].toLowerCase();
      if (line.includes('dob') || line.includes('birth') || line.includes('date of birth') || lines[i].trim() === match[1]) {
        result.dob = match[1];
        dobLineIdx = i;
        break;
      }
    }
  }
  // If no DOB-labeled line found, take first date match
  if (!result.dob) {
    for (let i = 0; i < lines.length; i++) {
      const match = lines[i].match(dobRegex);
      if (match) {
        result.dob = match[1];
        dobLineIdx = i;
        break;
      }
    }
  }

  // Extract name — look for name patterns
  // Try: "Patient: Last, First" or "Name: Last, First" or first line with comma pattern
  const namePatterns = [
    /(?:patient|name|pt)\s*[:]\s*(.+)/i,
    /^([A-Z][a-zA-Z'-]+,\s*[A-Z][a-zA-Z'-]+)/,
    /^([A-Z][a-zA-Z'-]+\s+[A-Z][a-zA-Z'-]+)$/,
  ];

  for (let i = 0; i < Math.min(lines.length, 5); i++) {
    if (i === dobLineIdx) continue;
    for (const pat of namePatterns) {
      const match = lines[i].match(pat);
      if (match) {
        result.name = match[1].trim();
        // Remove this line from what becomes the message
        lines[i] = '';
        break;
      }
    }
    if (result.name) break;
  }

  // If no name found, use first non-empty line
  if (!result.name && lines.length > 0) {
    for (let i = 0; i < lines.length; i++) {
      if (lines[i] && i !== dobLineIdx) {
        result.name = lines[i];
        lines[i] = '';
        break;
      }
    }
  }

  // Remove DOB line from message
  if (dobLineIdx >= 0) lines[dobLineIdx] = '';

  // Message = remaining lines
  result.message = lines.filter(l => l.trim()).join('\n');

  return result;
}

// ── Render ──
function renderList() {
  patientListEl.innerHTML = '';
  btnCopySignout.disabled = patients.length === 0;

  patients.forEach((pt, idx) => {
    const card = document.createElement('div');
    card.className = 'patient-card';
    card.innerHTML = `
      <div class="pt-name">${escHtml(pt.name || 'Unknown Patient')}</div>
      <div class="pt-dob">${pt.dob ? 'DOB: ' + escHtml(pt.dob) : ''}</div>
      ${pt.message ? `<div class="pt-field-label">Message</div><div class="pt-field-value">${escHtml(pt.message)}</div>` : ''}
      ${pt.assessment ? `<div class="pt-field-label">Assessment / Plan</div><div class="pt-field-value">${escHtml(pt.assessment)}</div>` : ''}
      <div class="card-actions">
        <button class="btn-edit" data-idx="${idx}">Edit</button>
        <button class="btn-delete" data-idx="${idx}">Delete</button>
      </div>
    `;
    patientListEl.appendChild(card);
  });

  // Attach card button listeners
  patientListEl.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEditModal(parseInt(btn.dataset.idx)));
  });
  patientListEl.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => deletePatient(parseInt(btn.dataset.idx)));
  });
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Modal ──
function openAddModal() {
  editingIndex = null;
  modalTitle.textContent = 'NEW PATIENT';
  btnSave.textContent = 'Save Patient';
  pasteArea.value = '';
  fieldName.value = '';
  fieldDob.value = '';
  fieldMessage.value = '';
  fieldAssessment.value = '';
  modalOverlay.classList.add('active');
  pasteArea.focus();
}

function openEditModal(idx) {
  editingIndex = idx;
  const pt = patients[idx];
  modalTitle.textContent = 'EDIT PATIENT';
  btnSave.textContent = 'Update Patient';
  pasteArea.value = pt.rawPaste || '';
  fieldName.value = pt.name || '';
  fieldDob.value = pt.dob || '';
  fieldMessage.value = pt.message || '';
  fieldAssessment.value = pt.assessment || '';
  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
  editingIndex = null;
}

function onPasteInput() {
  const text = pasteArea.value;
  const extracted = extractFromPaste(text);
  // Only auto-fill if field is currently empty (don't overwrite user edits)
  if (!fieldName.value) fieldName.value = extracted.name;
  if (!fieldDob.value) fieldDob.value = extracted.dob;
  if (!fieldMessage.value) fieldMessage.value = extracted.message;
}

function savePatient() {
  const pt = {
    name: fieldName.value.trim(),
    dob: fieldDob.value.trim(),
    message: fieldMessage.value.trim(),
    assessment: fieldAssessment.value.trim(),
    rawPaste: pasteArea.value,
    timestamp: new Date().toISOString()
  };

  if (!pt.name && !pt.message && !pt.assessment) {
    showToast('Please fill in at least a name, message, or assessment');
    return;
  }

  if (editingIndex !== null) {
    patients[editingIndex] = pt;
  } else {
    patients.push(pt);
  }

  saveToStorage();
  renderList();
  closeModal();
  showToast(editingIndex !== null ? 'Patient updated' : 'Patient added');
}

// ── Delete ──
function deletePatient(idx) {
  const name = patients[idx].name || 'this patient';
  showConfirm(`Delete ${name}?`, () => {
    patients.splice(idx, 1);
    saveToStorage();
    renderList();
    showToast('Patient deleted');
  });
}

// ── Clear All ──
function clearAll() {
  if (patients.length === 0) return;
  showConfirm('Clear all patients? This cannot be undone.', () => {
    patients = [];
    saveToStorage();
    renderList();
    showToast('All patients cleared');
  });
}

// ── Confirm Dialog ──
let confirmCallback = null;
function showConfirm(msg, onYes) {
  confirmMessage.textContent = msg;
  confirmCallback = onYes;
  confirmOverlay.classList.add('active');
}
confirmYes.addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
});
confirmNo.addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
  confirmCallback = null;
});

// ── Generate Signout ──
function generateSignout() {
  const date = formatDate();
  let output = `SIGNOUT — ${date}\n${'='.repeat(40)}\n`;

  patients.forEach((pt, i) => {
    output += '\n';
    output += `PT: ${pt.name || 'Unknown'}`;
    if (pt.dob) output += `  |  DOB: ${pt.dob}`;
    output += '\n';
    if (pt.message) output += `MESSAGE: ${pt.message}\n`;
    if (pt.assessment) output += `ASSESSMENT: ${pt.assessment}\n`;
    output += `${'─'.repeat(40)}\n`;
  });

  return output;
}

// ── Copy to Clipboard ──
async function copySignout() {
  if (patients.length === 0) return;
  const text = generateSignout();
  try {
    await navigator.clipboard.writeText(text);
    showToast('Signout copied to clipboard!');
  } catch {
    // Fallback: create temp textarea and select
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      showToast('Signout copied to clipboard!');
    } catch {
      showToast('Copy failed — try selecting manually');
    }
    document.body.removeChild(ta);
  }
}

// ── Toast ──
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ── Start ──
init();
</script>
</body>
</html>
